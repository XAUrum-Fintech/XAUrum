name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Resolve deployment base path and custom domain
        run: |
          CUSTOM_DOMAIN="${{ vars.CUSTOM_DOMAIN }}"
          if [ -z "$CUSTOM_DOMAIN" ] && [ -f public/CNAME ]; then
            CUSTOM_DOMAIN="$(head -n 1 public/CNAME | tr -d '[:space:]')"
          fi

          if [ -n "$CUSTOM_DOMAIN" ]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
            echo "CUSTOM_DOMAIN=$CUSTOM_DOMAIN" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/${{ github.event.repository.name }}/" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: npm run build

      - name: Add GitHub Pages SPA fallback and optional CNAME
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
          if [ -n "$CUSTOM_DOMAIN" ]; then
            echo "$CUSTOM_DOMAIN" > dist/CNAME
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
